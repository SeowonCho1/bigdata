  table:[
    ["pd.concat([df1,df2])", "행 방향 연결 (위아래)"],
    ["pd.concat([df1,df2], axis=1)", "열 방향 연결 (좌우)"],
    ["pd.concat([...], ignore_index=True)", "인덱스 재설정"],
    ["pd.merge(left, right, on=\"key\")", "inner join (기본)"],
    ["pd.merge(left, right, on=\"key\", how=\"left\")", "left join"],

  ],
  code:`import pandas as pd

# concat (행 방향)
df_a = pd.DataFrame({"id":[1,2],"score":[80,90]})
df_b = pd.DataFrame({"id":[3,4],"score":[75,85]})

combined = pd.concat([df_a, df_b], ignore_index=True)
print(combined)

# merge (inner join 기본)
left = pd.DataFrame({"id":[1,2,3],"amount":[500,300,800]})
right = pd.DataFrame({"id":[1,2,3],"grade":["Gold","Silver","Bronze"]})

merged = pd.merge(left, right, on="id")
print(merged)

# left join

print(left_merged)  # id=3은 grade=NaN`,

function esc(s){
  return String(s||"").replace(/[&<>"']/g, m=>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])
  );
}

function render(){
  const kw = document.getElementById("search").value.toLowerCase();
  const ch = document.querySelector(".ch-btn.active").dataset.ch;
  const container = document.getElementById("content");
  container.innerHTML = "";

  const partMap = {"p1": ["ch01","ch02"], "p2": ["p2-ch01","p2-ch02","p2-ch03","p2-ch04","p2-ch05"], "p3": ["p3-ch01","p3-ch02","p3-ch03","p3-ch04","p3-ch05"]};
  const filtered = sections.filter(s => {
    const matchCh = !ch || (partMap[ch] ? partMap[ch].includes(s.ch) : s.ch === ch);
    const matchKw = !kw ||
      (s.num+s.title+s.tags.join(" ")+s.desc+(s.tip||"")+(s.warn||"")).toLowerCase().includes(kw);
    return matchCh && matchKw;
  });

  if(filtered.length === 0){
    container.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
    return;
  }

  // 챕터 그룹핑
  const groups = {};
  filtered.forEach(s => {
    if(!groups[s.ch]) groups[s.ch] = {title: s.chTitle, items: []};
    groups[s.ch].items.push(s);
  });

  Object.values(groups).forEach(g => {
    const block = document.createElement("div");
    block.className = "chapter-block";
    block.innerHTML = `<div class="chapter-title">${esc(g.title)}</div>`;

    g.items.forEach(sec => {
      const card = document.createElement("div");
      card.className = "section-card";

      const tagHtml = sec.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("");
      const tipHtml = sec.tip ? `<div class="tip">${sec.tip}</div>` : "";
      const warnHtml = sec.warn ? `<div class="warn">${sec.warn}</div>` : "";

      let tableHtml = "";
      if(sec.table && sec.table.length){
        tableHtml = `<table class="key-table"><tr><th>문법 / 메서드</th><th>설명</th></tr>` +
          sec.table.map(r => `<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join("") +
          `</table>`;
      }

      card.innerHTML = `
        <div class="sec-header" onclick="toggleSec(this)">
          <span class="sec-num">${esc(sec.num)}</span>
          <span class="sec-title">${esc(sec.title)}</span>
          <span class="sec-arrow">▼</span>
        </div>
        <div class="sec-body">
          <div class="theory-section">
            <h4>핵심 개념</h4>
            <p class="desc">${sec.desc}</p>
            <div class="tag-row">${tagHtml}</div>
            ${tableHtml}
            ${tipHtml}
            ${warnHtml}
            <h4>코드 예제</h4>
            <pre><code>${esc(sec.code)}</code></pre>
          </div>
        </div>`;
      block.appendChild(card);
    });
    container.appendChild(block);
  });
}

function toggleSec(header){
  header.classList.toggle("open");
  const body = header.nextElementSibling;
  body.classList.toggle("open");
}

document.querySelectorAll(".ch-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".ch-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});
document.getElementById("search").addEventListener("input", render);

render();
</script>
