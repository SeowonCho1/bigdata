    ["pd.concat([df1,df2])", "행 방향 연결 (위아래)"],
    ["pd.concat([df1,df2], axis=1)", "열 방향 연결 (좌우)"],
    ["pd.concat([...], ignore_index=True)", "인덱스 재설정"],
    ["pd.merge(left, right, on=\"key\")", "inner join (기본)"],
    ["pd.merge(left, right, on=\"key\", how=\"left\")", "left join"],
    ["pd.merge(left, right, on=\"key\", how=\"outer\")", "outer join"],
    ["df1.join(df2)", "인덱스 기준 결합"],
  ],
  code:`import pandas as pd

# concat (행 방향)
df_a = pd.DataFrame({"id":[1,2],"score":[80,90]})
df_b = pd.DataFrame({"id":[3,4],"score":[75,85]})

combined = pd.concat([df_a, df_b], ignore_index=True)
print(combined)

# merge (inner join 기본)
left = pd.DataFrame({"id":[1,2,3],"amount":[500,300,800]})
right = pd.DataFrame({"id":[1,2,3],"grade":["Gold","Silver","Bronze"]})

merged = pd.merge(left, right, on="id")
print(merged)

# left join
right2 = pd.DataFrame({"id":[1,2],"grade":["Gold","Silver"]})
left_merged = pd.merge(left, right2, on="id", how="left")
print(left_merged)  # id=3은 grade=NaN`,
  tip:`<b>concat vs merge:</b> 같은 구조의 데이터를 단순히 이어붙일 때는 concat, 공통 키로 두 테이블을 연결할 때는 merge를 사용합니다.`
},
{
  ch:"ch02", chTitle:"CHAPTER 02 판다스",
  num:"SECTION 20", title:"피벗테이블",
  tags:["pivot_table","pivot","unstack","melt","aggfunc"],
  desc:`데이터를 행/열 기준으로 재구조화하며 집계합니다. SQL의 PIVOT과 유사합니다.`,
  table:[
    ["pd.pivot_table(df, index, columns, values, aggfunc)", "피벗테이블 생성"],
    ["aggfunc='mean'", "집계 함수: 평균 (기본값)"],
    ["aggfunc='sum'", "집계 함수: 합계"],
    ["aggfunc='count'", "집계 함수: 개수"],
    ["fill_value=0", "결측치를 0으로 채우기"],
    ["df.pivot(index, columns, values)", "고유값 보장 시 사용 (단순 재구조화)"],
    ["pd.melt(df, id_vars, value_vars)", "와이드 → 롱 형식 변환 (피벗 역변환)"],
  ],
  code:`import pandas as pd
import numpy as np

df = pd.DataFrame({
    "city": ["Seoul","Seoul","Busan","Busan","Daegu"],
    "category": ["A","B","A","B","A"],
    "amount": [500,300,800,200,600]
})

# 기본 피벗테이블 (city × category의 amount 평균)
pv = pd.pivot_table(df,
                    index="city",
                    columns="category",
                    values="amount",
                    aggfunc="mean")
print(pv)

# 결측치 개수
print(pv.isna().sum().sum())

# 합계 피벗테이블
pv_sum = pd.pivot_table(df,
                        index="city",
                        columns="category",
                        values="amount",
                        aggfunc="sum",
                        fill_value=0)
print(pv_sum)

# 피벗테이블에서 최댓값 위치 찾기
print(pv_sum.stack().idxmax())  # ('city', 'category')`,
},
];

function esc(s){
  return String(s||"").replace(/[&<>"']/g, m=>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])
  );
}

function render(){
  const kw = document.getElementById("search").value.toLowerCase();
  const ch = document.querySelector(".ch-btn.active").dataset.ch;
  const container = document.getElementById("content");
  container.innerHTML = "";

  const filtered = sections.filter(s => {
    const matchCh = !ch || s.ch === ch;
    const matchKw = !kw ||
      (s.num+s.title+s.tags.join(" ")+s.desc+(s.tip||"")+(s.warn||"")).toLowerCase().includes(kw);
    return matchCh && matchKw;
  });

  if(filtered.length === 0){
    container.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
    return;
  }

  // 챕터 그룹핑
  const groups = {};
  filtered.forEach(s => {
    if(!groups[s.ch]) groups[s.ch] = {title: s.chTitle, items: []};
    groups[s.ch].items.push(s);
  });

  Object.values(groups).forEach(g => {
    const block = document.createElement("div");
    block.className = "chapter-block";
    block.innerHTML = `<div class="chapter-title">${esc(g.title)}</div>`;

    g.items.forEach(sec => {
      const card = document.createElement("div");
      card.className = "section-card";

      const tagHtml = sec.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("");
      const tipHtml = sec.tip ? `<div class="tip">${sec.tip}</div>` : "";
      const warnHtml = sec.warn ? `<div class="warn">${sec.warn}</div>` : "";

      let tableHtml = "";
      if(sec.table && sec.table.length){
        tableHtml = `<table class="key-table"><tr><th>문법 / 메서드</th><th>설명</th></tr>` +
          sec.table.map(r => `<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join("") +
          `</table>`;
      }

      card.innerHTML = `
        <div class="sec-header" onclick="toggleSec(this)">
          <span class="sec-num">${esc(sec.num)}</span>
          <span class="sec-title">${esc(sec.title)}</span>
          <span class="sec-arrow">▼</span>
        </div>
        <div class="sec-body">
          <div class="theory-section">
            <h4>핵심 개념</h4>
            <p class="desc">${sec.desc}</p>
            <div class="tag-row">${tagHtml}</div>
            ${tableHtml}
            ${tipHtml}
            ${warnHtml}
            <h4>코드 예제</h4>
            <pre><code>${esc(sec.code)}</code></pre>
          </div>
        </div>`;
      block.appendChild(card);
    });
    container.appendChild(block);
  });
}

function toggleSec(header){
  header.classList.toggle("open");
  const body = header.nextElementSibling;
  body.classList.toggle("open");
}

document.querySelectorAll(".ch-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".ch-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});
document.getElementById("search").addEventListener("input", render);

render();
</script>
</body>
</html>
